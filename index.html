<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VitaIA — seu parceiro de saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand:       #1a9e72;
            --brand-light: #e6f7f1;
            --brand-dark:  #0f6b4c;
            --accent:      #f97316;
            --accent-soft: #fff3eb;
            --bg:          #f4f6f3;
            --surface:     #ffffff;
            --surface2:    #f9faf8;
            --border:      #e5e9e3;
            --text:        #1a1f18;
            --text2:       #5a6455;
            --text3:       #9ba896;
            --danger:      #e74c3c;
            --water:       #0ea5e9;
            --water-soft:  #e0f2fe;
            --protein:     #e84393;
            --protein-soft:#fce7f3;
            --mood:        #8b5cf6;
            --mood-soft:   #ede9fe;
            --radius-lg:   20px;
            --radius-md:   14px;
            --radius-sm:   10px;
            --shadow-sm:   0 2px 8px rgba(0,0,0,0.06);
            --shadow-md:   0 8px 28px rgba(0,0,0,0.10);
            --shadow-lg:   0 24px 60px rgba(0,0,0,0.16);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
        }

        /* ===== telas ===== */
        .tela {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg);
        }

        /* ===== login ===== */
        .loginWrap {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loginLogo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .loginLogo .logoIcon {
            width: 52px; height: 52px;
            background: var(--brand);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 24px rgba(26,158,114,0.35);
        }

        .loginLogo .logoText {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .loginLogo .logoSub {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .cardLogin {
            background: var(--surface);
            width: 100%;
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            gap: 6px;
            background: var(--surface2);
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 11px;
            background: transparent;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.22s;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            color: var(--text3);
        }
        .tab.ativo {
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            color: var(--brand-dark);
        }

        .campo { margin-bottom: 18px; }
        .campo label {
            display: block;
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }
        .campo input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: max(16px,14px);
            font-family: 'Sora', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--surface2);
            color: var(--text);
        }
        .campo input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(26,158,114,0.12);
            background: var(--surface);
        }

        .erro { font-size:11px; color:var(--danger); margin-top:4px; display:none; }
        .erro.visivel { display:block; }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 14px;
            font-family: 'Sora', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.12s, box-shadow 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(26,158,114,0.3);
            letter-spacing: 0.01em;
        }
        .btn:hover  { opacity: 0.88; box-shadow: 0 6px 20px rgba(26,158,114,0.38); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .btn.btnSecundario {
            background: var(--surface2);
            color: var(--text2);
            box-shadow: none;
            border: 1.5px solid var(--border);
        }
        .btn.btnSecundario:hover { background: var(--border); box-shadow: none; }

        /* ===== app ===== */
        .appContainer {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #telaApp { padding: 0; align-items: stretch; background: var(--bg); }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topoLeft { display: flex; align-items: center; gap: 12px; }
        .topoLogoMini {
            width: 36px; height: 36px;
            background: var(--brand);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(26,158,114,0.3);
        }
        .saudacao   { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
        .nomeUsuario { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

        .avatar {
            width: 40px; height: 40px;
            background: var(--brand-light);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--brand); cursor: pointer; flex-shrink: 0;
            user-select: none;
            transition: transform 0.15s, background 0.15s;
            font-size: 18px;
            border: 2px solid var(--brand);
        }
        .avatar:hover { transform: scale(1.05); background: var(--brand); color: white; }

        .conteudo {
            flex: 1;
            padding: 16px;
            padding-bottom: 90px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== cards ===== */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            word-break: break-word;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: var(--shadow-md); }

        .cardLabel {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            margin-bottom: 12px;
        }

        /* progress bar */
        .progressBar {
            height: 8px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
            margin: 8px 0 12px;
            border: 1px solid var(--border);
        }
        .progressFill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        /* stat grid */
        .statGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .statItem {
            background: var(--surface2);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        .statItem .statVal {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-top: 2px;
        }
        .statItem .statLbl {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* mood btns */
        .moodRow {
            display: flex;
            justify-content: space-around;
            margin-top: 8px;
        }
        .moodBtn {
            background: none;
            border: 2px solid transparent;
            padding: 10px 6px 6px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            text-align: center;
            transition: all 0.18s;
            flex: 1;
            margin: 0 3px;
        }
        .moodBtn .moodEmoji { font-size: 28px; display: block; }
        .moodBtn .moodLbl   { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; display: block; }
        .moodBtn:hover { background: var(--surface2); transform: translateY(-2px); }
        .moodBtn.sel   { background: var(--mood-soft); border-color: var(--mood); }
        .moodBtn.sel .moodLbl { color: var(--mood); }

        /* agua btns */
        .aguaRow { display: flex; gap: 8px; margin-top: 4px; }
        .aguaBtn {
            flex: 1; padding: 11px 0;
            background: var(--water-soft);
            color: var(--water);
            border: 1.5px solid rgba(14,165,233,0.2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.18s;
        }
        .aguaBtn:hover { background: var(--water); color: white; }

        /* insight box */
        .insightBox {
            background: linear-gradient(135deg, var(--brand-light), #e8f8f2);
            border: 1px solid rgba(26,158,114,0.2);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-top: 4px;
        }
        .insightBox .insightIcon {
            font-size: 18px;
            margin-bottom: 6px;
        }
        #insightTexto {
            font-size: 13px;
            line-height: 1.55;
            color: var(--brand-dark);
            font-weight: 500;
        }

        /* hero card */
        .heroCard {
            background: linear-gradient(140deg, var(--brand-dark) 0%, var(--brand) 60%, #22c993 100%);
            color: white;
            border-radius: var(--radius-lg);
            padding: 22px 20px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(26,158,114,0.35);
        }
        .heroCard::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .heroCard::after {
            content: '';
            position: absolute;
            bottom: -20px; right: 40px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .heroCard .heroTitle {
            font-size: 12px;
            opacity: 0.75;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        /* ex btns */
        .exBtn {
            padding: 8px 15px;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            border-radius: 99px;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.18s;
        }
        .exBtn:hover { border-color: var(--brand); color: var(--brand); }
        .exBtn.ativo { background: var(--brand); color: white; border-color: var(--brand); }

        /* ===== menu inferior ===== */
        .menuBaixo {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            max-width: 500px; width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 8px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 200;
        }
        .menuItem {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            font-size: 10px; color: var(--text3);
            cursor: pointer; padding: 6px 10px;
            border-radius: 14px;
            transition: color 0.18s, background 0.18s;
            user-select: none; white-space: nowrap;
            min-width: 52px; text-align: center;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .menuItem .menuIcon { font-size: 20px; display: block; line-height: 1; }
        .menuItem.ativo { color: var(--brand); background: var(--brand-light); }

        /* ===== modal ===== */
        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.visivel { display: flex; }
        .modalConteudo {
            background: var(--surface);
            width: 100%; max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            max-height: 88vh; max-height: 88dvh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        @keyframes toastIn {
            from { opacity:0; transform:translateX(-50%) translateY(10px); }
            to   { opacity:1; transform:translateX(-50%) translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(6px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .fadeIn { animation: fadeIn 0.3s ease forwards; }

        .modalHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .modalHeader h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .btnFechar {
            background: var(--surface2); border: 1px solid var(--border);
            font-size: 20px; cursor: pointer;
            line-height: 1; color: var(--text3); padding: 6px 10px;
            transition: all 0.2s; border-radius: 10px;
            font-family: 'Sora', sans-serif;
        }
        .btnFechar:hover { color: var(--text); background: var(--border); }

        /* ===== chat ===== */
        .chatArea {
            height: 280px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 14px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 4px;
        }
        .chatInputArea { display: flex; gap: 8px; align-items: flex-end; }
        .chatInputArea textarea {
            flex: 1; padding: 12px 14px;
            border-radius: var(--radius-md); border: 1.5px solid var(--border);
            resize: none; font-family: 'Sora', sans-serif;
            font-size: 14px; line-height: 1.4;
            min-height: 46px; max-height: 120px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--surface2);
            color: var(--text);
        }
        .chatInputArea textarea:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(26,158,114,0.12);
        }
        .btnEnviar { width: auto; padding: 0 20px; height: 46px; flex-shrink: 0; }

        .bolha {
            max-width: 82%; padding: 11px 15px;
            border-radius: 18px; font-size: 13.5px;
            line-height: 1.5; word-break: break-word;
            animation: fadeIn 0.22s ease;
        }
        .bolha.user {
            background: var(--brand);
            color: white; align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 12px rgba(26,158,114,0.3);
        }
        .bolha.ai {
            background: var(--surface2);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
        }
        .bolha.ai.typing { color: var(--text3); font-style: italic; }

        /* streaming cursor */
        .cursor { display:inline-block; width:2px; height:14px; background:var(--brand); margin-left:2px; animation:blink 0.7s steps(1) infinite; vertical-align:text-bottom; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ===== tele pros ===== */
        .proItem {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .proItem:hover { background: var(--brand-light); border-color: rgba(26,158,114,0.3); }
        .proItem .proEmoji { font-size: 28px; flex-shrink: 0; }
        .proItem strong { font-size: 14px; font-weight: 700; }
        .proItem small  { font-size: 12px; color: var(--text3); margin-top: 2px; display: block; }

        /* ===== labs ===== */
        .labItem {
            display: flex; align-items: center; gap: 14px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 10px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .labItem:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .labIcon { font-size: 36px; flex-shrink: 0; }
        .labName  { font-size: 15px; font-weight: 700; }
        .labDesc  { font-size: 12px; color: var(--text3); margin-top: 2px; }

        /* ===== responsivo ===== */
        @media (max-width: 390px) {
            .cardLogin { padding: 24px 18px; }
            .menuItem  { padding: 6px 6px; min-width: 44px; font-size: 9px; }
            .conteudo  { padding: 12px; padding-bottom: 88px; }
        }
        @media (min-width: 500px) {
            .modal { align-items: center; }
            .modalConteudo { border-radius: 24px; max-height: 80vh; }
        }
        @media (min-width: 768px) {
            .appContainer {
                border-radius: 28px;
                margin: 24px auto;
                min-height: calc(100vh - 48px);
                min-height: calc(100svh - 48px);
                overflow: hidden;
                box-shadow: var(--shadow-lg);
            }
            #telaApp { align-items: center; }
            .menuBaixo { border-radius: 0 0 28px 28px; }
        }

        /* ===== usuários salvos ===== */
        .quickUser {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 5px 13px;
            border-radius: 99px;
            margin: 2px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            color: var(--text2);
            transition: all 0.18s;
        }
        .quickUser:hover { background: var(--brand-light); color: var(--brand-dark); border-color: var(--brand); }

        /* ===== chip ===== */
        .chip {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ===== tela de login ===== -->
<div id="telaLogin" class="tela">
    <div class="loginWrap">
        <div class="loginLogo">
            <div class="logoIcon">🌿</div>
            <div>
                <div class="logoText">VitaIA</div>
                <div class="logoSub">seu parceiro de saúde</div>
            </div>
        </div>

        <div class="cardLogin">
            <div class="tabs">
                <button id="btnTabLogin" class="tab ativo" onclick="mostrarTab('login')">Entrar</button>
                <button id="btnTabCad"   class="tab"       onclick="mostrarTab('cadastro')">Criar conta</button>
            </div>

            <div id="formLogin">
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
                    <div class="erro" id="erroLoginEmail"></div>
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" placeholder="••••••" autocomplete="current-password">
                    <div class="erro" id="erroLoginSenha"></div>
                </div>
                <button class="btn" onclick="fazerLogin()">Entrar →</button>
                <div id="usuariosSalvos" style="margin-top:16px;font-size:12px;color:var(--text3)"></div>
            </div>

            <div id="formCadastro" style="display:none">
                <div class="campo">
                    <label>Seu nome</label>
                    <input type="text" id="cadNome" placeholder="Como te chamo?">
                    <div class="erro" id="erroCadNome"></div>
                </div>
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="cadEmail" placeholder="seu@email.com">
                    <div class="erro" id="erroCadEmail"></div>
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="cadSenha" placeholder="••••••">
                    <div class="erro" id="erroCadSenha"></div>
                </div>
                <div class="campo">
                    <label>Confirmar senha</label>
                    <input type="password" id="cadSenha2" placeholder="••••••">
                    <div class="erro" id="erroCadSenha2"></div>
                </div>
                <button class="btn" onclick="fazerCadastro()">Criar conta 🎉</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== app principal ===== -->

// ===== API OpenRouter — streaming (funciona no browser/GitHub Pages) =====
async function chamarClaude(prompt, onChunk) {
    if (!verificarChave()) throw new Error('SEM_CHAVE');

    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getApiKey()}`,
            'HTTP-Referer': location.href,
            'X-Title': 'VitaIA'
        },
        body: JSON.stringify({
            model: 'meta-llama/llama-3.3-70b-instruct:free',
            max_tokens: 400,
            stream: true,
            messages: [{ role: 'user', content: prompt }]
        })
    });

    if (!res.ok) {
        throw new Error('API error ' + res.status);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const d = line.slice(6).trim();
            if (d === '[DONE]') continue;
            try {
                const text = JSON.parse(d).choices?.[0]?.delta?.content || '';
                if (text) { full += text; if (onChunk) onChunk(text, full); }
            } catch {}
        }
    }
    return full;
}

    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); }, 2700);
}

    document.getElementById('loginEmail').value = email;

}

function fazerLogin() {
    limparErros();
    let email = document.getElementById('loginEmail').value.trim();
    let senha = document.getElementById('loginSenha').value;
    let users = pegarUsuarios();
    let user  = users.find(u => u.email === email);
    if (!user)               { mostrarErro('erroLoginEmail','E-mail não encontrado'); return; }
    if (user.senha !== senha){ mostrarErro('erroLoginSenha','Senha incorreta'); return; }

    usuarioAtual = { email: user.email, nome: user.nome };
    dadosUsuario = user.dados || { metaAgua:2, createdAt:new Date().toISOString(), ultimoReset:new Date().toDateString() };

    let hoje = new Date().toDateString();
    if (dadosUsuario.ultimoReset !== hoje) {
        aguaHoje=proteinaHoje=carboHoje=gorduraHoje=0;
        comidaLog=[]; exerciciosHoje=[];

        proteinaHoje  = dadosUsuario.proteina  || 0;
        carboHoje     = dadosUsuario.carbo     || 0;
        gorduraHoje   = dadosUsuario.gordura   || 0;
        comidaLog     = dadosUsuario.comidas   || [];
        exerciciosHoje= dadosUsuario.exercicios|| [];

    document.getElementById('nomeUser').innerText = user.nome;
    let hora = new Date().getHours();
    document.getElementById('saudacaoMsg').innerText = hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';

    limparErros();
    let nome   = document.getElementById('cadNome').value.trim();
    let email  = document.getElementById('cadEmail').value.trim();
    let senha  = document.getElementById('cadSenha').value;

    if (!nome)               { mostrarErro('erroCadNome',   'Coloca seu nome aí'); ok=false; }
    if (!email.includes('@')){ mostrarErro('erroCadEmail',  'Email inválido');     ok=false; }

    let users = pegarUsuarios();

    users.push({ nome, email, senha, dados:{ metaAgua:2, createdAt:new Date().toISOString(), ultimoReset:new Date().toDateString() } });

    mostrarToast('Conta criada! Faça o login 🎉','#1a9e72');

        `O usuário está se sentindo MAL (1/5) hoje. Mostre empatia real, acolha o momento difícil e dê 1 sugestão gentil e concreta para aliviar o dia — sem forçar positividade. Seja humano e cuidadoso.`,

        // 5 - Ótimo
        `O usuário está se sentindo ÓTIMO (5/5) hoje — cheio de energia! Canaliza essa energia para algo produtivo em saúde ou bem-estar. Tom animado e inspirador.`
    ][ultimoHumor];

    el.innerHTML = '<span style="color:var(--text3);font-style:italic">Gerando insight<span class="cursor"></span></span>';
    try {
        let full = '';
        const prompt = `Você é um coach de saúde empático e direto. ${moodContext}
Contexto adicional: bebeu ${aguaHoje.toFixed(1)}L de água hoje, consumiu ${Math.round(proteinaHoje)}g de proteína.
Responda com APENAS 1 frase curta (máx. 30 palavras). Sem introdução, sem "Olá", sem aspas. Só a frase.`;

            full = acc;

        });
        if (el) el.innerHTML = full;
    } catch(err) {
        if (err.message === 'SEM_CHAVE') { if (el) el.innerHTML = 'IA não configurada.'; return; }
        const fallbacks = [
            '',
            'Dias difíceis também fazem parte da jornada. Cuide-se com gentileza hoje.',
            'Tudo bem não estar tudo bem. Dê um passo pequeno e veja como se sente.',
            'Um dia neutro ainda é um dia para cuidar de você. Beba água e respire.',
            'Que bom que você está bem! Aproveite essa energia para um hábito saudável.',
            'Energia no máximo! Esse é o dia perfeito para superar seus limites. 🚀'
        ];
        if (el) el.innerHTML = fallbacks[ultimoHumor] || 'Continue assim! Seu bem-estar é a sua maior conquista. 💪';
    }
}

async function gerarPlanoIA() {
    let resultado = document.getElementById('resultadoPlano');
    let btn       = document.getElementById('btnGerarPlano');
    if (!btn || !resultado) return;

        resultado.innerHTML = `<div class="card" id="cardPlano" style="background:var(--brand-light);border-color:rgba(26,158,114,0.25)">
            <div class="cardLabel" style="color:var(--brand)">✨ Plano gerado com IA</div>
            <div id="textoPlano" style="font-size:13.5px;line-height:1.6;color:var(--brand-dark)"></div>
        </div>`;

        let textoEl = document.getElementById('textoPlano');
        let full = '';
        await chamarClaude(prompt, (chunk, acc) => {
            full = acc;
            if (textoEl) textoEl.innerHTML = full.replace(/\n/g,'<br>') + '<span class="cursor"></span>';
        });
        if (textoEl) textoEl.innerHTML = full.replace(/\n/g,'<br>');

        </div>`;
    }
    btn.disabled=false; btn.innerText='Gerar novamente →';
}

// ===== chat com streaming =====
function iniciarChat() {
    historicoChat=[];
    let area=document.getElementById('chatArea');
    if (area) area.innerHTML='<div class="bolha ai fadeIn">Olá! Sou a VitaIA 🌿 Como posso te ajudar com sua saúde hoje?</div>';
    let input=document.getElementById('chatInput');
    if (input) input.value='';
}

async function enviarChat() {
    let input=document.getElementById('chatInput');
    let msg=input?.value.trim();
    if (!msg) return;
    let area=document.getElementById('chatArea');
    area.innerHTML+=`<div class="bolha user fadeIn">${msg}</div>`;
    input.value=''; area.scrollTop=area.scrollHeight;

    let typing=document.createElement('div');
    typing.className='bolha ai typing';
    typing.innerHTML='digitando<span class="cursor"></span>';
    area.appendChild(typing); area.scrollTop=area.scrollHeight;

    historicoChat.push({role:'user',content:msg});
    try {
        let full = '';
        const sys = `Você é VitaIA, assistente de saúde empático, gentil e prático. Responda em português de forma acolhedora e concisa (máx. 3 parágrafos curtos). Foque em saúde, bem-estar, nutrição e qualidade de vida.`;
        await chamarClaudeChat(sys, historicoChat, (chunk, acc) => {
            full = acc;
            typing.className = 'bolha ai';
            typing.innerHTML = full.replace(/\n/g,'<br>') + '<span class="cursor"></span>';
            area.scrollTop = area.scrollHeight;
        });
        typing.innerHTML = full.replace(/\n/g,'<br>');
        historicoChat.push({role:'assistant',content:full});
    } catch {
        typing.innerHTML = 'Ops, não consegui responder agora. Tente em alguns segundos.';
        typing.className='bolha ai';
    }
    area.scrollTop=area.scrollHeight;
}

document.addEventListener('keydown', e => {
    if (e.target.id==='chatInput' && e.key==='Enter' && !e.shiftKey) { e.preventDefault(); enviarChat(); }
});

// ===== delegação de eventos globais =====
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('exBtn')) {
        let ex    = e.target.dataset.ex;
        let ativo = exerciciosHoje.includes(ex);
        if (ativo) exerciciosHoje = exerciciosHoje.filter(i=>i!==ex);
        else       exerciciosHoje.push(ex);
        ativo = !ativo;
        e.target.classList.toggle('ativo', ativo);
        dadosUsuario.exercicios = exerciciosHoje;
        salvarDadosUsuario();
        let log=document.getElementById('exLog');
        if (log) log.innerHTML = exerciciosHoje.length ? '✓ '+exerciciosHoje.join(' · ') : 'Nenhum exercício registrado';
        mostrarToast(ativo ? `✓ ${ex} adicionado!` : `✗ ${ex} removido`);
    }
    if (e.target.id === 'btnAjuda') {
        document.getElementById('modalChat').classList.add('visivel');
        iniciarChat();
    }
});
